<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="A premium RAG PDF Chatbot powered by Groq" />
  <title>RAG PDF Chatbot</title>
  
  <link rel="stylesheet" href="/static/style.css" />
  
  <!-- marked.js for Markdown parsing -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  
  <!-- Lucide icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <i data-lucide="sparkles" class="logo-icon"></i>
      <h2>Knowledge Base</h2>
      <button class="collapse-toggle" id="collapseToggle" title="Collapse sidebar">
        <i data-lucide="panel-left-close"></i>
      </button>
    </div>

    <label class="upload-box" id="uploadBox">
      <i data-lucide="file-up" class="upload-icon"></i>
      <div>
        <strong>Upload a Document</strong>
        <div style="font-size: 0.75rem; color: var(--text-muted); margin-top: 4px;">Drag & drop or click to browse</div>
      </div>
      <input type="file" id="fileInput" accept="application/pdf" />
    </label>

    <div class="folder-controls">
      <select id="folderSelect"></select>
      <button id="newFolderBtn" title="New folder"><i data-lucide="folder-plus"></i></button>
    </div>

    <div class="status-badge" id="statusBadge">
      <div class="status-indicator" id="statusIndicator"></div>
      <span id="statusText">Awaiting document</span>
    </div>

    <div class="folder-tree" id="folderTree"></div>

    <div class="resize-handle" id="resizeHandle"></div>
  </aside>

  <main class="main">
    <header class="chat-header">
      <button class="mobile-toggle" id="mobileToggle">
        <i data-lucide="menu"></i>
      </button>
      <div style="font-weight: 500; font-size: 0.95rem; margin-left: 12px;" id="headerTitle">RAG Assistant</div>
    </header>

    <div class="messages-container" id="messages">
      <!-- Welcome Message -->
      <div class="msg-wrapper bot">
        <div class="msg">
          <p>Hello! I'm your RAG Assistant. Please upload a PDF document using the sidebar, and then you can ask me questions about it.</p>
        </div>
      </div>
    </div>

    <div class="input-area">
      <div class="input-container">
        <input type="text" id="questionInput" placeholder="Ask a question about your document..." disabled autocomplete="off" />
        <button class="send-btn" id="sendBtn" disabled>
          <i data-lucide="send" style="width:18px; height:18px;"></i>
        </button>
      </div>
    </div>
  </main>

  <script src="/static/main.js"></script>
</body>
</html>
